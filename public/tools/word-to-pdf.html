<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFPals - Word to PDF</title>
    <link rel="stylesheet" href="../css/main.css?v=100">
    <link rel="stylesheet" href="../css/tool.css">
    <!-- JSZip (Required for docx-preview) -->
    <script src="../vendor/jszip/dist/jszip.min.js"></script>
    <!-- docx-preview -->
    <script src="../vendor/docx-preview/dist/docx-preview.min.js"></script>
    <style>
        .document-preview {
            background: white;
            color: black;
            padding: 0;
            width: 210mm;
            min-height: 297mm;
            margin: 2rem auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .docx-wrapper {
            padding: 20px !important;
            background: white !important;
        }

        @media print {

            /* 1. RESET ALL */
            :root,
            [data-theme],
            body {
                --bg-main: white !important;
                background: white !important;
                color: black !important;
            }

            body {
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
            }

            /* 2. HIDE UI */
            .app-header,
            header,
            .drop-zone,
            .controls,
            footer,
            .btn,
            #theme-toggle {
                display: none !important;
            }

            /* 3. LAYOUT CONTAINER */
            .app-container,
            main {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                display: block !important;
            }

            /* 4. PREVIEW WRAPPER */
            #preview-container {
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                z-index: 9999;
                background: white;
            }

            /* 5. DOCX CONTENT */
            .docx-wrapper {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
            }

            /* 6. PAGES (SECTIONS) */
            .docx-wrapper>section {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                /* Reset to 0 to avoid double padding, docx-preview handles internal margins */
                box-sizing: border-box !important;

                width: 100% !important;
                max-width: 100% !important;

                /* Slight Scale to fit printable area */
                transform: scale(0.98);
                transform-origin: top center;

                box-shadow: none !important;
                break-after: page;
                page-break-after: always;
                min-height: auto !important;

                /* CRITICAL: Allow visible overflow for headers/logos */
                overflow: visible !important;
                position: relative !important;
            }

            /* 7. IMAGES & TABLES */
            .docx-wrapper img,
            .docx-wrapper svg {
                max-width: 100% !important;
                height: auto !important;
            }

            table {
                width: 100% !important;
                border-collapse: collapse !important;
            }

            /* 8. PRINT SETTINGS */
            @page {
                size: auto;
                margin: 0mm;
                /* Browser margin 0, use padding instead */
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
    <script type="module" src="word-to-pdf.js"></script>
    <style>
        .workspace-card {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .file-info-badge {
            background: rgba(var(--primary-rgb), 0.1);
            border: 1px solid rgba(var(--primary-rgb), 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: inline-block;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .workspace:not(.hidden) {
            display: block !important;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
    <script src="../vendor/mammoth/mammoth.browser.min.js"></script>
    <script src="../vendor/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="../vendor/html2pdf.bundle.min.js"></script>
</head>

<body>
    <div class="app-container">
        <nav class="app-header">
            <a href="../index.html" class="brand-logo">
                <img src="../assets/icon.png" alt="PDFPals" style="height: 32px; vertical-align: middle; margin-right: 8px;"> PDFPals
            </a>
            <div class="tool-nav">
                <button id="theme-toggle" aria-label="Toggle Theme">
                    <span class="icon">☀️</span>
                </button>
                <a href="../index.html" class="btn back-link">Back to Menu</a>
            </div>
        </nav>

        <header style="text-align: center; margin-bottom: 3rem; margin-top: 2rem;">
            <h1 style="font-size: 2.8rem; margin-bottom: 1rem; background: linear-gradient(135deg, var(--text-main) 0%, var(--primary) 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Word to PDF</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto;">Convert Word documents (DOCX) to clean, portable PDF files effortlessly.</p>
        </header>

        <main>
            <div id="drop-zone" class="drop-zone">
                <div class="drop-content">
                    <div class="icon-row" style="font-size: 3.5rem; margin-bottom: 1.5rem;">
                        <span>📝</span>
                        <span style="font-size: 2rem; margin: 0 1rem; opacity: 0.5;">➔</span>
                        <span>📄</span>
                    </div>
                    <p style="font-size: 1.3rem; font-weight: 500;">Drop DOCX file here</p>
                    <p style="margin: 1rem 0;">or <label class="browse-btn">Select Document</label></p>
                    <input type="file" id="file-input" accept=".docx" hidden>
                </div>
            </div>

            <div id="workspace" class="workspace hidden">
                <div class="workspace-card">
                    <div class="file-info-badge">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">📄</div>
                        <h3 id="file-name" style="margin:0; font-size: 1.2rem;">filename.docx</h3>
                    </div>
                    <div style="display:flex; gap:1.2rem; justify-content: center;">
                        <button id="change-pdf-btn" class="btn secondary outline" style="border-radius: 12px; padding: 0.8rem 1.5rem;">Reset</button>
                        <button id="convert-btn" class="btn primary" style="border-radius: 12px; padding: 0.8rem 2.5rem; font-weight: 700;">Convert to PDF ➔</button>
                    </div>
                </div>
            </div>

            <div id="preview-container" class="preview-container hidden">
                <div id="preview-content" class="document-preview"></div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 PDFPals. Locally processed, secure & private.</p>
        </footer>
    </div>
    <script src="../js/theme.js?v=99"></script>
</body>

</html>
