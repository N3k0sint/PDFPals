<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFPals - Split PDF</title>
    <link rel="stylesheet" href="../css/main.css?v=100">
    <link rel="stylesheet" href="../css/tool.css">
    <style>
        .preview-container {
            max-width: 1200px;
            margin: 2rem auto;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            min-height: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .controls-glass {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 2rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .page-card.selected {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.3);
            background: rgba(var(--primary-rgb), 0.05);
        }

        .page-checkbox {
            position: absolute;
            top: 10px;
            left: 10px;
            transform: scale(1.3);
            cursor: pointer;
            accent-color: var(--primary);
        }

        #page-count {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
            background: rgba(var(--primary-rgb), 0.1);
            padding: 6px 12px;
            border-radius: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .preview-container:not(.hidden), .controls-glass:not(.hidden) {
            display: grid !important;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .controls-glass:not(.hidden) { display: flex !important; }
    </style>
    <script src="../vendor/pdf-lib/dist/pdf-lib.min.js"></script>
    <script type="module" src="split-pdf.js"></script>
</head>

<body>
    <div class="app-container">
        <nav class="app-header">
            <a href="../index.html" class="brand-logo">
                <img src="../assets/icon.png" alt="PDFPals" style="height: 32px; vertical-align: middle; margin-right: 8px;"> PDFPals
            </a>
            <div class="tool-nav">
                <button id="theme-toggle" aria-label="Toggle Theme">
                    <span class="icon">☀️</span>
                </button>
                <a href="../index.html" class="btn back-link">Back to Menu</a>
            </div>
        </nav>

        <header style="text-align: center; margin-bottom: 3rem; margin-top: 2rem;">
            <h1 style="font-size: 2.8rem; margin-bottom: 1rem; background: linear-gradient(135deg, var(--text-main) 0%, var(--primary) 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Split PDF</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem; max-width: 600px; margin: 0 auto;">Select specific ranges or extract pages into independent files with ease.</p>
        </header>

        <main>
            <div id="drop-zone" class="drop-zone">
                <div class="drop-content">
                    <div class="icon-row" style="font-size: 3.5rem; margin-bottom: 1.5rem;">
                        <span>✂️</span>
                        <span style="opacity: 0.3; margin: 0 1rem;">📄</span>
                    </div>
                    <p style="font-size: 1.3rem; font-weight: 500;">Drop PDF to extract pages</p>
                    <p style="margin: 1rem 0;">or <label class="browse-btn">Browse Local Files</label></p>
                    <input type="file" id="file-input" accept="application/pdf" hidden>
                </div>
            </div>

            <div id="controls" class="controls-glass hidden">
                <span id="page-count">0 pages</span>
                <div class="actions" style="display:flex; gap:1.2rem; align-items:center;">
                    <button id="reset-btn" class="btn secondary outline small" style="border-radius: 12px;">Switch File</button>
                    <button id="extract-btn" class="btn primary" style="border-radius: 12px; padding: 1rem 2rem; font-weight: 700;">Extract Selected ➔</button>
                </div>
            </div>

            <div id="preview-container" class="preview-container hidden">
                <!-- Pages will be injected here -->
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Decoding PDF architecture...</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 PDFPals. Locally processed, secure & private.</p>
        </footer>
    <script src="../js/theme.js?v=100"></script>
    <script src="../js/mobile-bridge.js"></script>
    <script type="module" src="split-pdf.js"></script>
</body>

</html>
