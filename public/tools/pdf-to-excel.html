<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFPals - PDF to Excel</title>
    <link rel="stylesheet" href="../css/main.css?v=100">
    <link rel="stylesheet" href="../css/tool.css">
    <!-- PDF.js -->
    <script src="../vendor/pdfjs-dist/build/pdf.mjs" type="module"></script>
    <!-- SheetJS -->
    <script src="../vendor/xlsx/dist/xlsx.full.min.js"></script>
    <script type="module" src="pdf-to-excel.js"></script>
    <style>
        .workspace-card {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3.5rem;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .file-info-badge {
            background: rgba(var(--primary-rgb), 0.1);
            border: 1px solid rgba(var(--primary-rgb), 0.2);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2.5rem;
            display: inline-block;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .workspace:not(.hidden) {
            display: block !important;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .spinner {
            border-top: 3px solid var(--primary);
            filter: drop-shadow(0 0 10px rgba(var(--primary-rgb), 0.5));
        }
    </style>
    <script type="module" src="pdf-to-excel.js"></script>
</head>

<body>
    <div class="app-container">
        <nav class="app-header">
            <a href="../index.html" class="brand-logo">
                <img src="../assets/icon.png" alt="PDFPals" style="height: 32px; vertical-align: middle; margin-right: 8px;"> PDFPals
            </a>
            <div class="tool-nav">
                <button id="theme-toggle" aria-label="Toggle Theme">
                    <span class="icon">☀️</span>
                </button>
                <a href="../index.html" class="btn back-link">Back to Menu</a>
            </div>
        </nav>

        <header style="text-align: center; margin-bottom: 4rem; margin-top: 2rem;">
            <h1 style="font-size: 3rem; margin-bottom: 1.2rem; background: linear-gradient(135deg, var(--text-main) 0%, var(--primary) 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;">PDF to Excel</h1>
            <p style="color: var(--text-muted); font-size: 1.25rem; max-width: 700px; margin: 0 auto; line-height: 1.6;">AI-powered data harvesting. Extract tabular data from PDFs into perfectly formatted Excel sheets.</p>
        </header>

        <main>
            <div id="drop-zone" class="drop-zone">
                <div class="drop-content">
                    <div class="icon-row" style="font-size: 4rem; margin-bottom: 1.5rem;">
                        <span>📄</span>
                        <span style="font-size: 2rem; margin: 0 1rem; opacity: 0.5;">➔</span>
                        <span>📊</span>
                    </div>
                    <p style="font-size: 1.3rem; font-weight: 500;">Drop PDF here</p>
                    <p style="margin: 1.5rem 0;">or <label class="browse-btn" style="text-decoration: underline;">Select Document</label></p>
                    <input type="file" id="file-input" accept="application/pdf" hidden>
                </div>
            </div>

            <div id="controls" class="workspace hidden">
                <div class="workspace-card">
                    <div class="file-info-badge">
                        <div style="font-size: 3.5rem; margin-bottom: 1rem;">📄</div>
                        <h3 id="file-name" style="margin:0; font-size: 1.3rem;">filename.pdf</h3>
                    </div>
                    <div style="display:flex; gap:1.2rem; justify-content: center;">
                        <button id="change-pdf-btn" class="btn secondary outline" style="border-radius: 12px; padding: 0.8rem 1.5rem;">Switch File</button>
                        <button id="convert-btn" class="btn primary" style="border-radius: 12px; padding: 1rem 2.8rem; font-weight: 700;">Convert to XLSX ➔</button>
                    </div>
                </div>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p style="margin-top: 1.5rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; font-size: 0.8rem; color: var(--primary);">Harvesting Tabular Data...</p>
            </div>

            <div id="status-message" class="hidden"
                style="margin-top: 2rem; color: var(--text-muted); text-align: center; font-style: italic; font-size: 0.9rem;"></div>
        </main>

        <footer>
            <p>&copy; 2026 PDFPals. Locally processed, secure & private.</p>
        </footer>
    </div>
    <script src="../js/theme.js?v=100"></script>
</body>

</html>
