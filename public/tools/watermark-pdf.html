<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFPals - Watermark PDF</title>
    <link rel="stylesheet" href="../css/main.css?v=100">
    <link rel="stylesheet" href="../css/tool.css">
    <style>
        .watermark-workspace {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 2.5rem;
            max-width: 1300px;
            margin: 0 auto;
        }

        .document-section {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 600px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        .sidebar-section {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid var(--border);
            padding: 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .wm-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem;
            border-radius: 12px;
        }

        .wm-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.85rem;
            opacity: 0.6;
        }

        .wm-tab:hover { background: rgba(255, 255, 255, 0.05); }

        .wm-tab.active {
            background: var(--primary);
            color: #000;
            opacity: 1;
            box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.3);
        }

        .setting-group {
            margin-bottom: 1.5rem;
        }

        .setting-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--primary);
            opacity: 0.8;
        }

        .input-field {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-main);
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
        }

        .format-toolbar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .format-btns {
            display: flex;
            gap: 0.5rem;
        }

        .format-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .format-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .format-btn.active { background: var(--primary); color: #000; }

        .position-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            width: 90px;
            background: var(--bg-main);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .grid-btn {
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .grid-btn.active { background: var(--primary); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .watermark-workspace:not(.hidden) {
            display: grid !important;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
    <script src="../vendor/pdf-lib/dist/pdf-lib.min.js"></script>
    <script type="module" src="watermark-pdf.js"></script>
</head>

<body>
    <div class="app-container">
        <nav class="app-header">
            <a href="../index.html" class="brand-logo">
                <img src="../assets/icon.png" alt="PDFPals" style="height: 32px; vertical-align: middle; margin-right: 8px;"> PDFPals
            </a>
            <div class="tool-nav">
                <button id="theme-toggle" aria-label="Toggle Theme">
                    <span class="icon">☀️</span>
                </button>
                <a href="../index.html" class="btn back-link">Back to Menu</a>
            </div>
        </nav>

        <header style="text-align: center; margin-bottom: 3rem; margin-top: 2rem;">
            <h1 style="font-size: 2.8rem; margin-bottom: 1rem; background: linear-gradient(135deg, var(--text-main) 0%, var(--primary) 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Watermark PDF</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto;">Protect your intellectual property with digital stamps and transparent overlays.</p>
        </header>

        <main>
            <div id="drop-zone" class="drop-zone">
                <div class="drop-content">
                    <div class="icon-row" style="font-size: 3.5rem; margin-bottom: 1.5rem;">
                        <span>🛡️</span>
                    </div>
                    <p style="font-size: 1.3rem; font-weight: 500;">Drop PDF to apply watermark</p>
                    <p style="margin: 1rem 0;">or <label class="browse-btn">Open File Browser</label></p>
                    <input type="file" id="file-input" accept=".pdf" hidden>
                </div>
            </div>

            <div id="workspace" class="watermark-workspace hidden">
                <div class="document-section">
                    <div id="file-preview" class="file-preview">
                        <div class="file-icon" style="font-size: 5rem; margin-bottom: 1.5rem;">📄</div>
                        <div id="file-name" class="file-name" style="font-weight: 600; font-size: 1.1rem; opacity: 0.8;">filename.pdf</div>
                    </div>
                </div>

                <aside class="sidebar-section" id="sidebar">
                    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                        <h2 style="font-size: 1.4rem; font-weight: 700;">Overlay Studio</h2>
                        <button id="change-pdf-btn" class="btn secondary outline small" style="border-radius: 10px;">Switch PDF</button>
                    </div>

                    <div class="wm-tabs">
                        <div class="wm-tab active" id="tab-text">TEXT MODE</div>
                        <div class="wm-tab" id="tab-image">IMAGE MODE</div>
                    </div>

                    <div id="text-settings">
                        <div class="setting-group">
                            <label for="wm-text">Watermark Text</label>
                            <input type="text" id="wm-text" class="input-field" value="CONFIDENTIAL">
                        </div>

                        <div class="setting-group">
                            <label>Typography & Style</label>
                            <div class="format-toolbar">
                                <div style="display: flex; gap: 0.5rem;">
                                    <select id="wm-font" class="input-field" style="flex: 2;">
                                        <option>Arial</option>
                                        <option>Courier</option>
                                        <option>Helvetica</option>
                                        <option>Times Roman</option>
                                    </select>
                                    <input type="number" id="wm-size" class="input-field" value="48" style="flex: 1;">
                                </div>
                                <div class="format-btns">
                                    <button class="format-btn"><b>B</b></button>
                                    <button class="format-btn"><i>I</i></button>
                                    <button class="format-btn" style="position:relative; overflow:hidden;">
                                        <span style="font-weight:bold; font-size: 1.2rem;">A</span>
                                        <div style="width:100%; height:4px; background:var(--primary); position:absolute; bottom:6px; left:0;"></div>
                                        <input type="color" id="wm-color" style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;" value="#FF0000">
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="image-settings" class="hidden">
                        <div class="setting-group">
                            <label>Source Image Asset</label>
                            <button class="btn secondary full-width" style="border-radius: 10px; padding: 0.8rem;" onclick="document.getElementById('wm-image-input').click()">Import SVG/PNG/JPG</button>
                            <input type="file" id="wm-image-input" accept="image/png, image/jpeg" hidden>
                            <div id="wm-image-preview" class="image-preview-container hidden" style="margin-top: 1rem; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 1rem; position: relative;">
                                <img id="wm-img-tag" src="" alt="Watermark Preview" style="max-height: 100px; display: block; margin: 0 auto;">
                                <button id="remove-img-btn" class="remove-btn" style="position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.5); border: none; color: #fff; width: 24px; height: 24px; border-radius: 50%; cursor: pointer;">✕</button>
                            </div>
                        </div>

                        <div class="setting-group">
                            <label>Asset Scaling</label>
                            <div style="display:flex; gap:1rem; align-items:center;">
                                <input type="range" id="wm-img-scale-slider" min="1" max="100" value="50" style="flex:1; accent-color: var(--primary);">
                                <input type="number" id="wm-img-scale" class="input-field" value="50" style="width: 70px;">
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 2rem; margin-top: 1rem;">
                        <div class="setting-group">
                            <label>Grid Position</label>
                            <div class="position-grid">
                                <button class="grid-btn" data-pos="top-left"></button>
                                <button class="grid-btn" data-pos="top-center"></button>
                                <button class="grid-btn" data-pos="top-right"></button>
                                <button class="grid-btn" data-pos="middle-left"></button>
                                <button class="grid-btn active" data-pos="middle-center"></button>
                                <button class="grid-btn" data-pos="middle-right"></button>
                                <button class="grid-btn" data-pos="bottom-left"></button>
                                <button class="grid-btn" data-pos="bottom-center"></button>
                                <button class="grid-btn" data-pos="bottom-right"></button>
                            </div>
                        </div>
                        <div class="setting-group" style="padding-top: 1.5rem;">
                            <label class="checkbox-group" style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer; text-transform: none; font-size: 0.9rem;">
                                <input type="checkbox" id="wm-mosaic" style="width: 18px; height: 18px; accent-color: var(--primary);">
                                <span>Mosaic Pattern</span>
                            </label>
                        </div>
                    </div>

                    <div class="setting-group" style="margin-top: 0.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div>
                            <label>Opacity</label>
                            <input type="range" id="wm-opacity" min="0" max="1" step="0.1" value="0.5" style="width: 100%; accent-color: var(--primary);">
                        </div>
                        <div>
                            <label>Rotation</label>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="number" id="wm-rotation" class="input-field" value="0" min="0" max="360">
                                <span style="opacity: 0.5;">°</span>
                            </div>
                        </div>
                    </div>

                    <button id="apply-btn" class="btn primary full-width action-btn" style="padding: 1.2rem; font-weight: 700; border-radius: 12px; margin-top: 1rem;">Apply Watermark ➔</button>
                </aside>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 PDFPals. Locally processed, secure & private.</p>
        </footer>
    </div>
    <!-- Essential Libraries -->
    <script src="../vendor/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="../vendor/pdfjs-dist/build/pdf.mjs" type="module"></script>
    <script type="module" src="watermark-pdf.js"></script>
    <script src="../js/theme.js?v=100"></script>
</body>

</html>
